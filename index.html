<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:rgba(255,255,255,0.08);--text:#f0f4ff;--muted:#6b7a99;--green:#10b981;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
#page-wrap{padding:24px 16px 48px;background:var(--bg);position:relative;z-index:1;will-change:transform;min-height:100vh;}
.header{text-align:center;margin-bottom:24px;}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;text-transform:uppercase;letter-spacing:2px;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.sub{font-size:12px;color:var(--muted);margin-top:6px;}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Barlow',sans-serif;font-size:11px;padding:5px 16px;border-radius:20px;cursor:pointer;margin:4px;transition:all 0.2s;}
.btn:hover{color:var(--text);}
.btn-primary{background:#3b82f6;border-color:#3b82f6;color:white;}
.btn-primary:hover{background:#2563eb;color:white;}
.btn-green{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.3);color:#10b981;}
.btn-danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#f87171;font-size:10px;padding:3px 10px;}

/* Pool switcher */
.pool-switcher{max-width:640px;margin:0 auto 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pool-switcher-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.pool-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;flex:1;outline:none;min-width:140px;}
.pool-select option{background:#1a2236;}

/* Pool list screen */
.pool-list-screen{max-width:640px;margin:0 auto;}
.pool-list-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;text-align:center;}
.pool-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s;}
.pool-item:hover{border-color:rgba(255,255,255,0.2);}
.pool-item.active{border-color:#3b82f6;}
.pool-item-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;flex:1;}

<script>
var ODDS_API = "https://script.google.com/macros/s/AKfycbyeMYsFI6sVfRnuPJgX_6-Ev9qr7dosfnpD-T-s9UtmMoQ03fjfHy6wuY3AJ63wU2wY/exec";
var NHL_WORKER = "https://lucky-forest-af32.gamache-m.workers.dev";
var ALL_COLORS = [
  {color:"#3b82f6",bg:"rgba(59,130,246,0.15)"},
  {color:"#10b981",bg:"rgba(16,185,129,0.15)"},
  {color:"#f59e0b",bg:"rgba(245,158,11,0.15)"},
  {color:"#a855f7",bg:"rgba(168,85,247,0.15)"},
  {color:"#ec4899",bg:"rgba(236,72,153,0.15)"},
  {color:"#06b6d4",bg:"rgba(6,182,212,0.15)"},
  {color:"#f97316",bg:"rgba(249,115,22,0.15)"},
  {color:"#84cc16",bg:"rgba(132,204,22,0.15)"}
];
var PALETTE = [
  "#3b82f6","#10b981","#f59e0b","#a855f7",
  "#ec4899","#06b6d4","#f97316","#84cc16",
  "#ef4444","#14b8a6","#8b5cf6","#f43f5e"
];
function hexToRgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function getPC(pool,idx){var def=ALL_COLORS[idx%ALL_COLORS.length];if(!pool||!pool.players||!pool.players[idx]||!pool.players[idx].color)return def;var c=pool.players[idx].color;return{color:c,bg:hexToRgba(c,0.15)};}
var ALL_TEAMS = ["COL","EDM","TBL","LAK","BUF","MTL","PIT","ANA","MIN","OTT","PHI","UTA","CAR","VGK","DAL","BOS"];

// My player — localStorage personalization per pool
var _makerState = {};
var _detailStateMaker = null;
var _lgoReplayDataM = null;
var _playerCards = {};
function _myPlayerKey(){var p=getActivePool();return p?'myPlayer_'+(p.id||p.title):null;}
function getMyPlayer(){try{var k=_myPlayerKey();return k?localStorage.getItem(k):null;}catch(e){return null;}}
function setMyPlayer(abbrev){
  try{var k=_myPlayerKey();if(!k)return;
    if(abbrev===getMyPlayer())localStorage.removeItem(k);else localStorage.setItem(k,abbrev);
  }catch(e){}
  _rebuildMakerUI();
}
function _rebuildMakerUI(){
  var st=_makerState;
  if(!st.pieTotals)return;
  document.getElementById('legwrap').innerHTML=_buildMakerLegendPie(st.pieTotals,st.pieSvg);
  document.getElementById('tonight-wrap').innerHTML=buildOnTheClock(st.gamesData||[],st.odds);
  document.getElementById('swrap').innerHTML=buildStandings(st.odds,st.historyData)+buildTeamOdds(st.odds,st.roundOdds,st.historyData)+buildScoringLeaders(st.leaders,st.odds)+buildGoalieLeaders(st.goalies,st.odds);
}
function _buildMakerLegendPie(pieTotals,pieSvg){
  var me=getMyPlayer();
  var myData=me?pieTotals.find(function(p){return(p.abbrev||'').toUpperCase()===me.toUpperCase();}):null;
  var myRank=me?pieTotals.findIndex(function(p){return(p.abbrev||'').toUpperCase()===me.toUpperCase();})+1:-1;
  var standingBlock='';
  if(myData&&myRank>0){
    var rl=["1st","2nd","3rd","4th"][myRank-1]||(myRank+'th');
    var pc=getPC(getActivePool(),myData.ci);

  }
  var pool=getActivePool();

var R1W = [{t:"COL",b:"LAK"},{t:"DAL",b:"MIN"},{t:"VGK",b:"UTA"},{t:"EDM",b:"ANA"}];
var R1E = [{t:"BUF",b:"BOS"},{t:"TBL",b:"MTL"},{t:"CAR",b:"OTT"},{t:"PIT",b:"PHI"}];

var setupPlayers = [];
var setupTitle = "Playoff Pool";
var editingPoolId = null;

// ---- Storage ----
function getAllPools() {
  try { var s = localStorage.getItem("pp2026_pools"); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function savePools(pools) {
  try { localStorage.setItem("pp2026_pools", JSON.stringify(pools)); } catch(e) {}
}
function getActiveId() {
  try { return localStorage.getItem("pp2026_active") || null; } catch(e) { return null; }
}
function setActiveId(id) {
  try { localStorage.setItem("pp2026_active", id); } catch(e) {}
}
function getActivePool() {
  var pools = getAllPools();
  var id = getActiveId();
  return (id && pools[id]) ? pools[id] : null;
}
function generateId() {
  return "pool_" + Date.now();
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ---- Pool List Screen ----
function showPoolList() {
  showSection("pool-list");
  drawPoolList();
}

function drawPoolList() {
  var pools = getAllPools();
  var activeId = getActiveId();
  var ids = Object.keys(pools);
  var el = document.getElementById("pool-list");
  el.innerHTML = "";

  var wrap = document.createElement("div");
  wrap.className = "pool-list-screen";

  var title = document.createElement("div");
  title.className = "pool-list-title";
  title.textContent = "My Pools";
  wrap.appendChild(title);

  if (ids.length === 0) {
    var empty = document.createElement("div");
    empty.className = "loading";
    empty.textContent = "No pools yet — create one below!";
    wrap.appendChild(empty);
  }

  ids.forEach(function(id) {
    var pool = pools[id];
    var item = document.createElement("div");
    item.className = "pool-item" + (id === activeId ? " active" : "");

    var nameEl = document.createElement("div");
    nameEl.className = "pool-item-name";
    nameEl.textContent = pool.title || "Untitled Pool";
    item.appendChild(nameEl);

    var meta = document.createElement("div");
    meta.className = "pool-item-meta";
    meta.textContent = pool.players.length + " players";
    item.appendChild(meta);

    var actions = document.createElement("div");
    actions.className = "pool-item-actions";

    var selectBtn = document.createElement("button");
    selectBtn.className = "btn" + (id === activeId ? " btn-primary" : "");
    selectBtn.textContent = id === activeId ? "Active" : "Switch";
    (function(pid) {
      selectBtn.onclick = function(e) {
        e.stopPropagation();
        setActiveId(pid);
        showSection("main");
        doRender();
        drawPoolSwitcher();
      };
    })(id);
    actions.appendChild(selectBtn);

    var editBtn = document.createElement("button");
    editBtn.className = "btn";
    editBtn.textContent = "Edit";
    (function(pid) {
      editBtn.onclick = function(e) {
        e.stopPropagation();
        startEditPool(pid);
      };
    })(id);
    actions.appendChild(editBtn);

    var delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger";
    delBtn.textContent = "✕";
    (function(pid) {
      delBtn.onclick = function(e) {
        e.stopPropagation();
        if (!confirm("Delete this pool?")) return;
        var p = getAllPools();
        delete p[pid];
        savePools(p);
        if (getActiveId() === pid) {
          var remaining = Object.keys(p);
          setActiveId(remaining.length > 0 ? remaining[0] : null);
        }
        drawPoolList();
        drawPoolSwitcher();
      };
    })(id);
    actions.appendChild(delBtn);

    item.appendChild(actions);
    wrap.appendChild(item);
  });

  // New pool button
  var newWrap = document.createElement("div");
  newWrap.style.textAlign = "center";
  newWrap.style.marginTop = "16px";
  var newBtn = document.createElement("button");
  newBtn.className = "btn btn-green";
  newBtn.textContent = "+ New Pool";
  newBtn.onclick = function() { startNewPool(); };
  newWrap.appendChild(newBtn);

  if (getActiveId()) {
    var backBtn = document.createElement("button");
    backBtn.className = "btn";
    backBtn.textContent = "← Back";
    backBtn.onclick = function() { showSection("main"); doRender(); };
    newWrap.appendChild(backBtn);
  }

  wrap.appendChild(newWrap);
  el.appendChild(wrap);
}

function drawPoolSwitcher() {
  var pools = getAllPools();
  var ids = Object.keys(pools);
  var wrap = document.getElementById("pool-switcher-wrap");
  if (ids.length <= 1) { wrap.innerHTML = ""; return; }
  var activeId = getActiveId();
  var html = '<div class="pool-switcher"><span class="pool-switcher-label">Pool</span><select class="pool-select" onchange="switchPool(this.value)">';
  ids.forEach(function(id) {
    html += '<option value="' + esc(id) + '"' + (id === activeId ? " selected" : "") + '>' + esc(pools[id].title || "Untitled") + '</option>';
  });
  html += '</select><button class="btn btn-green" onclick="startNewPool()" style="margin:0;padding:4px 12px;font-size:10px">+ New</button></div>';
  wrap.innerHTML = html;
}

function switchPool(id) {
  setActiveId(id);
  var pool = getActivePool();
  if (pool) document.getElementById("pool-title").textContent = pool.title || "Playoff Pool";
  doRender();
}

// ---- Setup / Edit ----
function startNewPool() {
  editingPoolId = null;
  setupTitle = "Playoff Pool";
  setupPlayers = [
    {name:"Player 1",abbrev:"P1",teams:[]},
    {name:"Player 2",abbrev:"P2",teams:[]},
    {name:"Player 3",abbrev:"P3",teams:[]},
    {name:"Player 4",abbrev:"P4",teams:[]}
  ];
  showSection("setup");
  drawSetup();
}

function startEditPool(id) {
  var pools = getAllPools();
  var pool = pools[id];
  if (!pool) return;
  editingPoolId = id;
  setupTitle = pool.title || "Playoff Pool";
  setupPlayers = pool.players.map(function(p) {
    return {name:p.name, abbrev:p.abbrev||p.name.substring(0,3).toUpperCase(), teams:p.teams.slice(), color:p.color||null};
  });
  showSection("setup");
  drawSetup();
}

function showSetup() {
  var active = getActivePool();
  if (active) {
    startEditPool(getActiveId());
  } else {
    startNewPool();
  }
}

function readCurrentNames() {
  var titleEl = document.getElementById("setup-title");
  if (titleEl) setupTitle = titleEl.value || "Playoff Pool";
  setupPlayers.forEach(function(p, i) {
    var aEl = document.getElementById("pa"+i);
    var nEl = document.getElementById("pn"+i);
    if (aEl) p.abbrev = aEl.value.toUpperCase().substring(0,3) || p.name.substring(0,3).toUpperCase();
    if (nEl) p.name = nEl.value || ("Player "+(i+1));
  });
}

  var taken = {};

  var out = document.getElementById("setup");
  out.innerHTML = "";
  var wrap = document.createElement("div");
  wrap.className = "setup-screen";

  // Title
  var titleWrap = document.createElement("div");
  titleWrap.className = "title-wrap";
  var tl = document.createElement("div");
  tl.className = "slabel";
  tl.style.marginBottom = "8px";
  tl.textContent = "Pool name";
  titleWrap.appendChild(tl);
  var ti = document.createElement("input");
  ti.className = "title-input";
  ti.id = "setup-title";
  ti.value = setupTitle;
  ti.placeholder = "PLAYOFF POOL";
  ti.maxLength = 30;
  titleWrap.appendChild(ti);
  wrap.appendChild(titleWrap);

  var pl = document.createElement("div");
  pl.className = "slabel";
  pl.textContent = "Players & teams";
  wrap.appendChild(pl);

  setupPlayers.forEach(function(p,i) {
    var pc = setupPlayers[i].color ? {color:setupPlayers[i].color, bg:hexToRgba(setupPlayers[i].color,0.15)} : ALL_COLORS[i%ALL_COLORS.length];
    var block = document.createElement("div");
    block.className = "player-block";
    var head = document.createElement("div");
    head.className = "player-head";
    var dot = document.createElement("div");
    dot.className = "pdot";
    dot.style.background = pc.color;
    dot.style.width = "18px";
    dot.style.height = "18px";
    dot.style.borderRadius = "50%";
    dot.title = "Change colour";
    (function(pi, dotEl, blockEl) {
      dotEl.onclick = function() {
        var existing = blockEl.querySelector('.color-palette');
        if (existing) { existing.remove(); return; }
        var pal = document.createElement('div');
        pal.className = 'color-palette';
        PALETTE.forEach(function(hex) {
          var sw = document.createElement('div');
          sw.className = 'cswatch' + (hex === (setupPlayers[pi].color || PALETTE[pi % PALETTE.length]) ? ' selected' : '');
          sw.style.background = hex;
          sw.onclick = function(e) {
            e.stopPropagation();
            readCurrentNames();
            setupPlayers[pi].color = hex;
            drawSetup();
          };
          pal.appendChild(sw);
        });
        blockEl.insertBefore(pal, blockEl.querySelector('.teams-grid'));
      };
    })(i, dot, block);
    head.appendChild(dot);
    var ai = document.createElement("input");
    ai.className = "pabbrev";
    ai.id = "pa"+i;
    ai.value = p.abbrev||"";
    ai.placeholder = "ABC";
    ai.maxLength = 3;
    ai.addEventListener("input", readCurrentNames);
    head.appendChild(ai);
    var ni = document.createElement("input");
    ni.className = "pname";
    ni.id = "pn"+i;
    ni.value = p.name||"";
    ni.placeholder = "Player "+(i+1)+" name";
    ni.addEventListener("input", readCurrentNames);
    head.appendChild(ni);
    var cnt = document.createElement("span");
    cnt.className = "pcount";
    cnt.textContent = p.teams.length+" teams";
    head.appendChild(cnt);
    if (setupPlayers.length > 2) {
      var rb = document.createElement("button");
      rb.className = "btn btn-danger";
      rb.textContent = "✕ Remove";
      (function(idx){rb.onclick=function(){readCurrentNames();setupPlayers.splice(idx,1);drawSetup();};})(i);
      head.appendChild(rb);
    }
    block.appendChild(head);
    var grid = document.createElement("div");
    grid.className = "teams-grid";
    ALL_TEAMS.forEach(function(t){
      var mine = p.teams.indexOf(t)>=0;
      var takenBy = (t in taken)&&taken[t]!==i;
      var btn = document.createElement("div");
      btn.className = "tbtn"+(takenBy?" taken":"");
      btn.textContent = t;
      if (mine){btn.style.background=pc.bg;btn.style.borderColor=pc.color;btn.style.color=pc.color;}
      if (!takenBy){
        (function(pi,team){btn.onclick=function(){readCurrentNames();var ix=setupPlayers[pi].teams.indexOf(team);if(ix>=0)setupPlayers[pi].teams.splice(ix,1);else setupPlayers[pi].teams.push(team);drawSetup();};})(i,t);
      }
      grid.appendChild(btn);
    });
    block.appendChild(grid);
    wrap.appendChild(block);
  });

  if (setupPlayers.length < 8) {
    var aw = document.createElement("div");
    aw.className = "add-wrap";
    var ab = document.createElement("button");
    ab.className = "btn btn-green";

    ab.onclick = function(){readCurrentNames();var n=setupPlayers.length+1;setupPlayers.push({name:"Player "+n,abbrev:"P"+n,teams:[]});drawSetup();};

  var acts = document.createElement("div");

  };
  acts.appendChild(cb);
  wrap.appendChild(acts);
  out.appendChild(wrap);
}

function saveSetup() {
  readCurrentNames();
  var title = setupTitle.trim() || "Playoff Pool";
  var pools = getAllPools();
  var id = editingPoolId || generateId();
  pools[id] = {title:title, players:setupPlayers, created:Date.now()};
  savePools(pools);
  setActiveId(id);
  document.getElementById("pool-title").textContent = title;
  showSection("main");
  drawPoolSwitcher();
  doRender();
}

// ---- Section management ----
function showSection(name) {
  var sections = ["setup","pool-list","main","swrap","legwrap","pool-switcher-wrap"];
  sections.forEach(function(s){
    var el = document.getElementById(s);
    if (!el) return;
    if (s === name || (name === "main" && (s==="swrap"||s==="legwrap"||s==="pool-switcher-wrap"||s==="pie-wrap"))) {
      el.style.display = "";
    } else if (s !== "pool-switcher-wrap") {
      el.style.display = "none";
    }
  });
  if (name !== "main") {
    document.getElementById("swrap").style.display = "none";
    document.getElementById("legwrap").style.display = "none";
    document.getElementById("pool-switcher-wrap").style.display = "none";
  }
}

function buildSeriesGames(t1,t2,gamesData){
  if(!gamesData||!gamesData.length)return'';
  var games=gamesData.filter(function(g){
    return [g.away,g.home].indexOf(t1)>=0&&[g.away,g.home].indexOf(t2)>=0;
  }).sort(function(a,b){return new Date(a.startUTC)-new Date(b.startUTC);});
  if(!games.length)return'';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return games.map(function(g,i){
    var d=new Date(g.startUTC);
    var dET=new Date(d.getTime()-4*3600000);
    var dateStr=months[dET.getUTCMonth()]+' '+dET.getUTCDate();
    var num='<span class="game-num">G'+(i+1)+'</span>';
    var dc='<span class="game-date-col">'+dateStr+'</span>';
    var as=g.awayScore||0,hs=g.homeScore||0;
    if(g.state==='OFF'||g.state==='FINAL'){
      var ot=(g.periodType&&g.periodType!=='REG')?' OT':'';
      var doneClick=g.id?(' onclick="event.stopPropagation();showLiveGameOverlayMaker(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')" style="cursor:pointer"'):'';
      return'<div class="game-row"'+doneClick+'>'+num+dc+'<span class="game-result final">'+g.away+' '+as+' · '+hs+' '+g.home+ot+'</span>'+(g.id?'<span style="color:#374151;font-size:10px;margin-left:auto">▶&#xFE0E;</span>':'')+'</div>';
    }else if(g.state==='LIVE'||g.state==='CRIT'){
      var liveClick=g.id?(' onclick="event.stopPropagation();showLiveGameOverlayMaker(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')" style="cursor:pointer"'):'';
      return'<div class="game-row"'+liveClick+'>'+num+'<span class="game-date-col" style="color:#f87171;font-weight:700">LIVE</span><span class="game-result live">'+g.away+' '+as+' · '+hs+' '+g.home+(g.period?' P'+g.period:'')+'</span><span style="color:#6b7280;font-size:10px;margin-left:auto">▶&#xFE0E;</span></div>';
    }else{
      return'<div class="game-row">'+num+dc+'<span class="game-result future">'+formatGameTime(g.startUTC)+'</span></div>';
    }
  }).join('');
}

function buildSparkline(histData,team,liveVal){
  var raw=((histData)||[])
    .filter(function(d){return (d.team||'').toUpperCase()===team.toUpperCase()&&d.cup!=null&&d.cup!=='';})
    .sort(function(a,b){return(a.date||'').localeCompare(b.date||'');})
    .map(function(d){return{date:d.date,val:parseFloat(d.cup)};})
    .filter(function(d){return!isNaN(d.val);});
  if(liveVal!=null){var td=new Date().toISOString().substring(0,10);var ix=raw.findIndex(function(d){return d.date===td;});if(ix>=0)raw[ix].val=liveVal;else raw.push({date:td,val:liveVal});}
  if(raw.length<2)return'';
  // Filter to significant changes (>= 0.8pp), always keep first & last
  var THRESH=0.8;
  var points=[raw[0]];
  for(var i=1;i<raw.length-1;i++){
    if(Math.abs(raw[i].val-points[points.length-1].val)>=THRESH)points.push(raw[i]);
  }
  points.push(raw[raw.length-1]);
  if(points.length<2)return'';
  var W=200,H=38,padX=8,padY=8;
  var vals=points.map(function(p){return p.val;});
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);
  var range=max-min||0.5;
  var xs=points.map(function(_,i){return padX+(i/(points.length-1))*(W-padX*2);});
  var ys=vals.map(function(v){return padY+(H-padY*2)*(1-(v-min)/range);});
  var trend=vals[vals.length-1]-vals[0];
  var color=trend>0.2?'#4ade80':trend<-0.2?'#f87171':'#9ca3af';
  var poly=xs.map(function(x,i){return x.toFixed(1)+','+ys[i].toFixed(1);}).join(' ');
  var area='M'+xs[0].toFixed(1)+','+H+' '+xs.map(function(x,i){return'L'+x.toFixed(1)+','+ys[i].toFixed(1);}).join(' ')+' L'+xs[xs.length-1].toFixed(1)+','+H+' Z';
  var dots=points.map(function(p,i){return'<circle cx="'+xs[i].toFixed(1)+'" cy="'+ys[i].toFixed(1)+'" r="'+(i===points.length-1?2.5:1.8)+'" fill="'+color+'"/>';}).join('');
  var dateLabels=points.map(function(p,i){
    var md=(p.date||'').substring(5).replace('-','/');
    var anchor=i===0?'start':i===points.length-1?'end':'middle';
    return'<text x="'+xs[i].toFixed(1)+'" y="'+(H+9)+'" font-size="6.5" fill="#6b7280" text-anchor="'+anchor+'" font-family="monospace">'+md+'</text>';
  }).join('');
  var valLabels=points.map(function(p,i){
    if(i!==0&&i!==points.length-1)return'';
    var anchor=i===0?'start':'end';

function parseSeries(arr){

    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#'+gradId+')"/>'
    +'<polyline points="'+poly+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +dots+'</svg>';
}

function computePlayerStreak(histData,teams,liveTotal){
  if(!histData||histData.length<2)return null;
  var dates=[...new Set(histData.map(function(d){return d.date;}).filter(Boolean))].sort();
  if(dates.length<2)return null;
  var today=new Date().toISOString().substring(0,10);
  var points=dates.map(function(date){
    if(date===today&&liveTotal!=null)return liveTotal;
    return teams.reduce(function(sum,team){
      var e=histData.find(function(d){return d.date===date&&(d.team||'').toUpperCase()===team.toUpperCase();});
      return sum+(e?parseFloat(e.cup)||0:0);
    },0);
  });
  if(!dates.includes(today)&&liveTotal!=null)points.push(liveTotal);
  if(points.length<2)return null;
  var n=points.length-1;
  var lastDiff=points[n]-points[n-1];
  if(Math.abs(lastDiff)<0.05)return null;
  var dir=lastDiff>0?1:-1;
  var count=1;
  for(var i=n-1;i>=1;i--){
    var diff=points[i]-points[i-1];
    if(Math.abs(diff)<0.05)break;
    if((diff>0?1:-1)===dir)count++;
    else break;
  }
  return count>=2?{dir:dir>0?'up':'down',days:count}:null;
}

function buildStreakBadge(histData,teams,liveTotal){
  var streak=computePlayerStreak(histData,teams,liveTotal);
  if(!streak)return'';
  var isUp=streak.dir==='up';
  var arrow=isUp?'▲':'▼';
  var fire=isUp&&streak.days>=3?' 🔥':'';
  var color=isUp?'#4ade80':'#f87171';
  var bg=isUp?'rgba(74,222,128,0.12)':'rgba(248,113,113,0.12)';
  return'<div class="streak-badge" style="color:'+color+';background:'+bg+';border-color:'+color+'33">'+arrow+streak.days+' DAYS'+fire+'</div>';
}

function buildDetailChart(histData, series, gradId) {
  if (!histData || histData.length < 2 || !series || !series.length) return '';
  var today = new Date().toISOString().substring(0,10);
  var dates = [...new Set(histData.map(function(d){return d.date;}).filter(Boolean))].sort();
  if (!dates.includes(today)) dates.push(today);
  if (dates.length < 2) return '';

  var allSeries = series.map(function(s) {
    var pts = dates.map(function(date) {
      if (date === today && s.liveTotal != null) return s.liveTotal;
      return s.teams.reduce(function(sum, team) {
        var e = histData.find(function(d){return d.date===date&&(d.team||'').toUpperCase()===team.toUpperCase();});
        return sum+(e?parseFloat(e.cup)||0:0);
      }, 0);
    });
    return {teams:s.teams, color:s.color, liveTotal:s.liveTotal, isPrimary:s.isPrimary, points:pts};
  });

  var allPts = allSeries.reduce(function(acc,s){return acc.concat(s.points);}, []);
  var dataMin=Math.min.apply(null,allPts), dataMax=Math.max.apply(null,allPts);
  var pad=Math.max(2,(dataMax-dataMin)*0.25);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if(yMax===yMin){yMin=Math.max(0,yMin-5);yMax=Math.min(100,yMax+5);}

  var W=340,H=190,padL=30,padR=10,padT=20,padB=38;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=dates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}

  var rawRange=yMax-yMin;
  var niceSteps=[0.5,1,2,5,10,15,20,25,50];
  var step=niceSteps.find(function(s){return rawRange/s<=5;}) || 25;
  var gridVals=[];
  for(var g=Math.ceil(yMin/step)*step; g<=yMax+0.001; g+=step) gridVals.push(Math.round(g*10)/10);
  var grid=gridVals.map(function(v){
    var y=gy(v).toFixed(1);
    return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>'
      +'<text x="'+(padL-4)+'" y="'+(gy(v)+3.5).toFixed(1)+'" text-anchor="end" font-size="8" font-family="Barlow Condensed,sans-serif" fill="#4b5563">'+v+'%</text>';
  }).join('');

  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtD(d){
    if(d===today)return'Now';
    var p=d.split('-');return months[parseInt(p[1])-1]+' '+parseInt(p[2]);
  }
  var dateEls=dates.map(function(d,i){
    var x=gx(i),baseY=padT+cH+5;
    return '<text transform="rotate(-40,'+x.toFixed(1)+','+baseY+')" x="'+x.toFixed(1)+'" y="'+baseY+'" text-anchor="end" font-size="11" font-family="Barlow Condensed,sans-serif" fill="#6b7280">'+fmtD(d)+'</text>';
  }).join('');

  var solo=series.length===1;
  var nonPrimary=allSeries.filter(function(s){return !s.isPrimary;});
  var primary=allSeries.filter(function(s){return s.isPrimary;});
  var renderOrder=nonPrimary.concat(primary);

  var defs='<defs>';
  var paths='';
  renderOrder.forEach(function(s) {
    var pts=s.points;
    var linePts=pts.map(function(v,i){return gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ');
    if (s.isPrimary) {
      var gid=gradId||'sdg-p';
      defs+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
        +'<stop offset="0%" stop-color="'+s.color+'" stop-opacity="0.2"/>'
        +'<stop offset="100%" stop-color="'+s.color+'" stop-opacity="0"/>'
        +'</linearGradient>';
      var areaD='M'+gx(0).toFixed(1)+','+(padT+cH)+' '
        +pts.map(function(v,i){return'L'+gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ')
        +' L'+gx(n-1).toFixed(1)+','+(padT+cH)+' Z';
      paths+='<path d="'+areaD+'" fill="url(#'+gid+')"/>';
    }
    paths+='<polyline points="'+linePts+'" fill="none" stroke="'+s.color+'" stroke-width="'+(s.isPrimary?2:1.5)+'" stroke-linecap="round" stroke-linejoin="round" opacity="'+(s.isPrimary?1:0.7)+'"/>';
    pts.forEach(function(v,i) {
      var x=gx(i),y=gy(v),isLast=i===n-1;
      paths+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(isLast?4:s.isPrimary?3:2.5)+'" fill="'+s.color+'" opacity="'+(s.isPrimary?1:0.75)+'"/>';
      if (solo) {
        var lY=(i%2===0)?(y-7):(y+13);
        if(y-7<padT)lY=y+13;
        if(lY>padT+cH-2)lY=y-7;
        paths+='<text x="'+x.toFixed(1)+'" y="'+lY.toFixed(1)+'" text-anchor="middle" font-size="8.5" font-family="Barlow Condensed,sans-serif" fill="'+s.color+'" font-weight="'+(isLast?'700':'400')+'">'+v.toFixed(1)+'%</text>';
      } else if (isLast) {
        var lY2=y-8; if(lY2<padT)lY2=y+12;
        paths+='<text x="'+x.toFixed(1)+'" y="'+lY2.toFixed(1)+'" text-anchor="middle" font-size="8.5" font-family="Barlow Condensed,sans-serif" fill="'+s.color+'" font-weight="700">'+v.toFixed(1)+'%</text>';
      }
    });
  });
  defs+='</defs>';

  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block">'
    +defs+grid+paths+dateEls+'</svg>';
}

function toggleDetailPlayerMaker(abbrev) {

function buildSeriesDetailChart(histData, t1, t2, roundKey, lv1, lv2) {

      .sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); })

  var allDates=[...new Set([...Object.keys(map1),...Object.keys(map2)])].sort();
  if (allDates.length<2) return '';
  var THRESH=1.0, kept=[allDates[0]], fp1=map1[allDates[0]]!=null?map1[allDates[0]]:null, fp2=map2[allDates[0]]!=null?map2[allDates[0]]:null;
  for (var ki=1; ki<allDates.length-1; ki++) {
    var kd=allDates[ki], kv1=map1[kd]!=null?map1[kd]:fp1, kv2=map2[kd]!=null?map2[kd]:fp2;
    var kchg=Math.max(fp1!=null?Math.abs(kv1-fp1):0, fp2!=null?Math.abs(kv2-fp2):0);
    if (kchg>=THRESH){kept.push(kd);if(map1[kd]!=null)fp1=map1[kd];if(map2[kd]!=null)fp2=map2[kd];}
  }
  if (allDates.length>1) kept.push(allDates[allDates.length-1]);
  allDates=[...new Set(kept)];
  var v1arr=[], v2arr=[], last1=null, last2=null;
  allDates.forEach(function(d){
    if (map1[d]!=null) last1=map1[d];
    if (map2[d]!=null) last2=map2[d];
    v1arr.push(last1); v2arr.push(last2);
  });
  var allVals=[...v1arr,...v2arr].filter(function(v){return v!=null;});
  if (!allVals.length) return '';
  var dataMin=Math.min.apply(null,allVals), dataMax=Math.max.apply(null,allVals);
  var pad=Math.max(3,(dataMax-dataMin)*0.25);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if (yMax===yMin){yMin=Math.max(0,yMin-10);yMax=Math.min(100,yMax+10);}
  var W=340,H=185,padL=32,padR=12,padT=18,padB=40;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=allDates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}
  var rawRange=yMax-yMin;
  var niceSteps=[1,2,5,10,15,20,25,50];
  var step=niceSteps.find(function(s){return rawRange/s<=5;})||25;
  var gridVals=[];
  for (var g=Math.ceil(yMin/step)*step; g<=yMax+0.001; g+=step) gridVals.push(Math.round(g*10)/10);
  var grid=gridVals.map(function(v){
    var y=gy(v).toFixed(1);
    return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>'
      +'<text x="'+(padL-4)+'" y="'+(gy(v)+3.5).toFixed(1)+'" text-anchor="end" font-size="8" font-family="Barlow Condensed,sans-serif" fill="#4b5563">'+v+'%</text>';
  }).join('');
  var ref50=(yMin<=50&&yMax>=50)
    ?'<line x1="'+padL+'" y1="'+gy(50).toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy(50).toFixed(1)+'" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>'
    :'';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtD(d){ if(d===today)return'Now'; var p=d.split('-');return months[parseInt(p[1])-1]+' '+parseInt(p[2]); }
  var dateEls=allDates.map(function(d,i){
    var x=gx(i), baseY=padT+cH+8;
    return '<text transform="rotate(-40,'+x.toFixed(1)+','+baseY+')" x="'+x.toFixed(1)+'" y="'+baseY+'" text-anchor="end" font-size="9" font-family="Barlow Condensed,sans-serif" fill="#6b7280">'+fmtD(d)+'</text>';
  }).join('');
  var col1='#60a5fa', col2='#fb923c';
  function buildLine(varr, col) {
    var pts=[];
    varr.forEach(function(v,i){if(v!=null)pts.push({x:gx(i),y:gy(v)});});
    if (pts.length<2) return '';
    var poly=pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
    var dots=pts.map(function(p,j){
      return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(j===pts.length-1?3:2)+'" fill="'+col+'"/>';
    }).join('');
    return '<polyline points="'+poly+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+dots;
  }
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block">'
    +grid+ref50+buildLine(v1arr,col1)+buildLine(v2arr,col2)+dateEls+'</svg>';
}

// Compact game list for bracket card expand: finished + live games only, no date
function buildBracketGames(t1, t2, gamesData) {
  if (!gamesData || !gamesData.length) return '';
  var games = gamesData.filter(function(g) {
    return [g.away,g.home].indexOf(t1)>=0 && [g.away,g.home].indexOf(t2)>=0;
  }).sort(function(a,b){ return new Date(a.startUTC)-new Date(b.startUTC); });
  var rows = games.map(function(g, i) {
    var as = g.awayScore||0, hs = g.homeScore||0;
    var gn = '<span class="bc-gn">G' + (i+1) + '</span>';
    if (g.state==='OFF'||g.state==='FINAL') {
      var awayWin = as > hs, homeWin = hs > as;
      var awayStr = (awayWin ? '<span class="bc-win">' : '') + g.away + ' ' + as + (awayWin ? '</span>' : '');
      var homeStr = (homeWin ? '<span class="bc-win">' : '') + hs + ' ' + g.home + (homeWin ? '</span>' : '');
      return '<div class="bc-gr">' + gn + '<span>' + awayStr + ' · ' + homeStr + '</span></div>';
    } else if (g.state==='LIVE'||g.state==='CRIT') {
      return '<div class="bc-gr bc-gr-live">' + gn + '<span style="color:#f87171;font-size:9px;margin-right:2px">LIVE</span><span>' + g.away + ' ' + as + ' · ' + hs + ' ' + g.home + (g.period?' P'+g.period:'') + '</span></div>';
    } else {
      return null; // skip future games
    }
  }).filter(Boolean).join('');
  return rows;
}

// Detect which round is currently active (highest round with real teams)
function getActiveRound(parsed) {
  if (!parsed) return 1;
  if (parsed.r4 && parsed.r4.topTeam && parsed.r4.topTeam !== 'TBD') return 4;
  if ((parsed.r3||[]).some(function(s){return s&&s.topTeam&&s.topTeam!=='TBD';})) return 3;
  if ((parsed.r2||[]).every(function(s){return s&&s.topTeam&&s.topTeam!=='TBD';})) return 2;
  return 1;
}

function buildDeserveGauge(shots, awayTeam, homeTeam, aColor, hColor) {

      var el=document.getElementById('live-game-overlay');
      if(!el)return;

    return '<img src="https://assets.nhle.com/logos/nhl/svg/'+abbrev+'_'+logoSfx(abbrev)+'.svg" style="width:'+sz+'px;height:'+sz+'px;object-fit:contain;flex-shrink:0" onerror="this.style.display=\'none\'">';
  }
  function pillM(owner, ci) {
    if (!owner) return '';
    var color = pool ? getPC(pool, ci).color : '#6b7280';
    return '<span style="background:'+color+'22;color:'+color+';font-size:10px;padding:1px 6px;border-radius:9px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700">'+owner+'</span>';
  }

  var timeStr = '';
  try { timeStr = new Date(data.startTimeUTC).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZone:'America/New_York',hour12:true})+' ET'; } catch(e){}

  var logoUrl = function(t,sz){ return '<img src="https://assets.nhle.com/logos/nhl/svg/'+t+'_'+logoSfx(t)+'.svg" style="width:'+sz+'px;height:'+sz+'px;object-fit:contain;flex-shrink:0;vertical-align:middle" onerror="this.style.display=\'none\'">'; };

  var html = '<div style="max-width:480px;margin:0 auto">';

  // ── Header ───────────────────────────────────────────────────────────────
  html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:8px">';
  html += '<div style="flex:1;min-width:0">';
  // 3-col grid: away (right-aligned) | @ | home (left-aligned)
  html += '<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:6px">';
  // Away
  html += '<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;min-width:0">';
  if (awayOwner) html += pillM(awayOwner, awayCI);
  html += logoUrl(awayAbbrev, 48);
  html += '<div style="text-align:right;min-width:0"><div style="font-size:22px;color:#f9fafb;line-height:1;white-space:nowrap">'+awayName+'</div><div style="font-size:13px;color:#6b7280;line-height:1.4">'+awayAbbrev+'</div></div>';
  html += '</div>';
  // @
  html += '<div style="font-size:18px;color:#374151;font-family:\'Barlow Condensed\',sans-serif;font-weight:400;text-align:center;padding:0 2px">@</div>';
  // Home
  html += '<div style="display:flex;align-items:center;justify-content:flex-start;gap:6px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;min-width:0">';
  html += '<div style="text-align:left;min-width:0"><div style="font-size:22px;color:#f9fafb;line-height:1;white-space:nowrap">'+homeName+'</div><div style="font-size:13px;color:#6b7280;line-height:1.4">'+homeAbbrev+'</div></div>';
  html += logoUrl(homeAbbrev, 48);
  if (homeOwner) html += pillM(homeOwner, homeCI);
  html += '</div>';
  html += '</div>';
  // Subtitle: records + time (centered)
  html += '<div style="font-size:11px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.3px;text-align:center">';
  html += [awayRec, timeStr, homeRec].filter(Boolean).join(' · ');
  html += '</div>';
  html += '</div>';
  html += '<button onclick="document.getElementById(\'game-preview-overlay-m\').remove()" style="background:rgba(255,255,255,0.08);border:none;color:#9ca3af;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-size:14px;flex-shrink:0">✕</button>';
  html += '</div>';

  // ── Win Probability + Gameline ───────────────────────────────────────────
  if (wp.away != null && wp.home != null) {
    var awayPct = wp.away * 100, homePct = wp.home * 100;
    html += '<div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px 16px;margin-bottom:12px">';
    html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px">Chance of Winning</div>';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
    html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:30px;font-weight:900;color:#f9fafb;min-width:60px;text-align:right;line-height:1">'+awayPct.toFixed(1)+'%</div>';
    html += '<div style="flex:1;height:7px;border-radius:99px;overflow:hidden;background:#1f2937;position:relative">';
    html += '<div style="position:absolute;left:0;top:0;bottom:0;width:'+awayPct.toFixed(1)+'%;background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div>';
    html += '</div>';
    html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:30px;font-weight:900;color:#f9fafb;min-width:60px;text-align:left;line-height:1">'+homePct.toFixed(1)+'%</div>';
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:'+(gl.awayOdds?'10':'0')+'px">';
    html += '<span style="font-size:10px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif">'+awayAbbrev+'</span>';
    html += '<span style="font-size:10px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif">'+homeAbbrev+'</span>';
    html += '</div>';
    if (gl.awayOdds || gl.homeOdds) {
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);text-align:center">';
      html += '<div><div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px">'+awayAbbrev+' line</div>';
      html += '<div style="font-size:15px;color:#e5e7eb;font-family:\'Barlow Condensed\',sans-serif;font-weight:800">'+gpOddsM(gl.awayOdds)+'</div></div>';
      html += '<div><div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px">Book</div>';
      html += '<div style="font-size:11px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;text-transform:capitalize">'+(gl.provider||'—')+'</div></div>';
      html += '<div><div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px">'+homeAbbrev+' line</div>';
      html += '<div style="font-size:15px;color:#e5e7eb;font-family:\'Barlow Condensed\',sans-serif;font-weight:800">'+gpOddsM(gl.homeOdds)+'</div></div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // ── Series Implications ──────────────────────────────────────────────────
  function implPanelM(teamAbbrev, teamName, owner, ci, allOdds, winOdds, loseOdds) {
    if (!allOdds || allOdds.cup == null) return '';
    var cupSwing = (winOdds.cup||0) - (loseOdds.cup||0);
    var r3Swing  = (winOdds.r3 ||0) - (loseOdds.r3 ||0);
    if (cupSwing < 0.02 && r3Swing < 0.02) return '';
    var s = '<div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px 16px;margin-bottom:12px">';
    s += '<div style="font-size:10px;color:#f59e0b;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px">SERIES IMPLICATIONS</div>';
    s += '<div style="display:flex;align-items:center;gap:7px;margin-bottom:12px">';
    s += logoUrl(teamAbbrev, 26);
    s += '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:900;color:#f9fafb">'+teamName+'</span>';
    if (owner) s += pillM(owner, ci);
    s += '</div>';
    var tiles = [
      {label:'Make CF',  w:winOdds.r3,  l:loseOdds.r3,  a:allOdds.r3},
      {label:'Make SCF', w:winOdds.r4,  l:loseOdds.r4,  a:allOdds.r4},
      {label:'Win Cup',  w:winOdds.cup, l:loseOdds.cup, a:allOdds.cup}
    ].filter(function(t){ return (t.a||0) >= 0.001 || (t.w||0) >= 0.001; });
    s += '<div style="display:grid;grid-template-columns:repeat('+tiles.length+',1fr);gap:6px">';
    tiles.forEach(function(t) {
      s += '<div style="background:rgba(0,0,0,0.25);border-radius:10px;padding:10px 8px;text-align:center">';
      s += '<div style="font-size:9px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">'+t.label+'</div>';
      s += '<div style="font-size:19px;color:#22c55e;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;line-height:1">'+gpFmtM(t.w)+'</div>';
      s += '<div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;margin-bottom:8px">if win</div>';
      s += '<div style="height:1px;background:rgba(255,255,255,0.06);margin-bottom:8px"></div>';
      s += '<div style="font-size:19px;color:#f87171;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;line-height:1">'+gpFmtM(t.l)+'</div>';
      s += '<div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif">if lose</div>';
      s += '</div>';
    });
    s += '</div></div>';
    return s;
  }
  html += implPanelM(awayAbbrev, awayName, awayOwner, awayCI, awayAll, awayWin, awayLose);
  html += implPanelM(homeAbbrev, homeName, homeOwner, homeCI, homeAll, homeWin, homeLose);

  // ── Goaltending ──────────────────────────────────────────────────────────
  if ((data.awayGoalies && data.awayGoalies.length) || (data.homeGoalies && data.homeGoalies.length)) {
    html += '<div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px 16px;margin-bottom:12px">';
    html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px">Goaltending</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
    function goalieColM(goalies, totals, abbrev) {
      var starter = (goalies||[])[0], backup = (goalies||[])[1];
      var s = '<div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px">';
      s += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:10px">';
      s += logo(abbrev, 18);
      var tr = (totals||{}).record||'';
      if (tr) s += '<span style="font-size:11px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif">'+tr+' team</span>';
      s += '</div>';
      if (starter) {
        s += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
        if (starter.headshot) s += '<img src="'+starter.headshot+'" style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1)" onerror="this.style.display=\'none\'">';
        s += '<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:800;color:#f9fafb;line-height:1.1">'+starter.name+'</div>';
        s += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;color:#22c55e;font-weight:700;margin-top:1px">'+(starter.record||'')+'</div></div></div>';
        s += '<div style="display:flex;gap:8px">';
        s += '<div style="flex:1;background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 6px;text-align:center">';
        s += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:800;color:#e5e7eb">'+(starter.gaa||0).toFixed(2)+'</div>';
        s += '<div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.3px">GAA</div></div>';
        s += '<div style="flex:1;background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 6px;text-align:center">';
        s += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:800;color:#e5e7eb">.'+Math.round((starter.savePctg||0)*1000)+'</div>';
        s += '<div style="font-size:9px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.3px">SV%</div></div></div>';
      }
      if (backup && backup.gamesPlayed > 0) {
        s += '<div style="display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">';
        if (backup.headshot) s += '<img src="'+backup.headshot+'" style="width:26px;height:26px;border-radius:50%;object-fit:cover;opacity:0.7" onerror="this.style.display=\'none\'">';
        s += '<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:12px;color:#6b7280">'+backup.name+'</div>';
        s += '<div style="font-size:10px;color:#4b5563;font-family:\'Barlow Condensed\',sans-serif">'+(backup.record||'')+' · '+(backup.gaa||0).toFixed(2)+' · .'+Math.round((backup.savePctg||0)*1000)+'</div></div></div>';
      }
      s += '</div>';
      return s;
    }
    html += goalieColM(data.awayGoalies, data.awayGoalieTeamTotals, awayAbbrev);
    html += goalieColM(data.homeGoalies, data.homeGoalieTeamTotals, homeAbbrev);
    html += '</div></div>';
  }

  // ── Players to Watch ─────────────────────────────────────────────────────
  if (data.skaterLeaders && data.skaterLeaders.length) {
    html += '<div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px 16px;margin-bottom:12px">';
    html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px">Players to Watch</div>';
    data.skaterLeaders.forEach(function(cat) {
      html += '<div style="display:grid;grid-template-columns:1fr auto 56px auto 1fr;align-items:center;gap:8px;padding:10px 0;border-top:1px solid rgba(255,255,255,0.05)">';
      // Away: headshot + name
      html += '<div style="display:flex;align-items:center;gap:7px;overflow:hidden">';
      if (cat.away.headshot) html += '<img src="'+cat.away.headshot+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display=\'none\'">';
      html += '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:800;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+cat.away.name+'</span>';
      html += '</div>';
      // Away stat
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:24px;font-weight:900;color:#3b82f6;line-height:1;text-align:right">'+cat.away.value+'</div>';
      // Category
      html += '<div style="text-align:center;font-size:8px;color:#374151;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.6px;text-transform:uppercase;line-height:1.3">'+cat.category+'</div>';
      // Home stat
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:24px;font-weight:900;color:#3b82f6;line-height:1;text-align:left">'+cat.home.value+'</div>';
      // Home: name + headshot
      html += '<div style="display:flex;align-items:center;gap:7px;flex-direction:row-reverse;overflow:hidden">';
      if (cat.home.headshot) html += '<img src="'+cat.home.headshot+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display=\'none\'">';
      html += '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:800;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;direction:rtl">'+cat.home.name+'</span>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  overlay.innerHTML = html;
}

// ── Bracket View ──────────────────────────────────────────────────────────
function getSeriesLeader(sr) {
  if (!sr || !sr.topTeam || sr.topTeam === 'TBD') return 'TBD';
  if (sr.topWins === 4) return sr.topTeam;
  if (sr.bottomWins === 4) return sr.bottomTeam;
  return sr.topTeam + '/' + sr.bottomTeam;
}
function predictedMatchup(s1, s2) {
  var t1 = getSeriesLeader(s1), t2 = getSeriesLeader(s2);
  if (t1 === 'TBD' && t2 === 'TBD') return null;
  return {topTeam: t1, bottomTeam: t2, topWins: 0, bottomWins: 0, isPredicted: true};
}
function augmentPartialR2(series, s1, s2) {
  if (!series || series.isPredicted) return series;
  var topTBD = !series.topTeam || series.topTeam === 'TBD';
  var botTBD = !series.bottomTeam || series.bottomTeam === 'TBD';
  if (!topTBD && !botTBD) return series;
  var knownTeam = topTBD ? series.bottomTeam : series.topTeam;
  var s1has = s1 && (s1.topTeam === knownTeam || s1.bottomTeam === knownTeam);
  var otherSeries = s1has ? s2 : s1;
  var pred = getSeriesLeader(otherSeries);
  if (!pred || pred === 'TBD') return series;
  var out = Object.assign({}, series);
  if (topTBD) out.topTeam = pred; else out.bottomTeam = pred;
  return out;
}

function buildBracketCard(s, gamesData, isLarge, shareMode, isCompact) {
  if (s && s.isPredicted) {
    var pt1 = s.topTeam === 'TBD' ? '?' : s.topTeam;
    var pt2 = s.bottomTeam === 'TBD' ? '?' : s.bottomTeam;
    return '<div class="bc-card bc-tbd">'
      + '<div class="bc-team"><span class="bc-name" style="opacity:0.45">' + pt1 + '</span></div>'
      + '<div class="bc-team"><span class="bc-name" style="opacity:0.45">' + pt2 + '</span></div>'
      + '</div>';
  }
  if (!s || !s.topTeam || s.topTeam === 'TBD') {
    return '<div class="bc-card bc-tbd">'
      + '<div class="bc-team" style="justify-content:center"><span class="bc-name" style="color:var(--muted)">TBD</span></div>'
      + '<div class="bc-team" style="justify-content:center"><span class="bc-name" style="color:var(--muted)">TBD</span></div>'
      + '</div>';
  }
  var pool = getActivePool();
  var t1 = s.topTeam, t2 = s.bottomTeam;
  var w1 = s.topWins || 0, w2 = s.bottomWins || 0;
  var t1elim = w2 === 4, t2elim = w1 === 4;
  var t1lead = w1 > w2, t2lead = w2 > w1;
  var o1 = getTeamOwnerMaker(t1), o2 = getTeamOwnerMaker(t2);
  var c1 = o1 ? getPC(pool, o1.ci).color : null;
  var c2 = o2 ? getPC(pool, o2.ci).color : null;
  var live = gamesData && isSeriesLive(gamesData, t1, t2);
  var bg1 = c1 ? hexToRgba(c1, 0.2) : null;
  var bg2 = c2 ? hexToRgba(c2, 0.2) : null;
  var p1pill = o1 ? '<span class="bc-pill" style="background:' + bg1 + ';color:' + c1 + '">' + o1.abbrev + '</span>' : '';
  var p2pill = o2 ? '<span class="bc-pill" style="background:' + bg2 + ';color:' + c2 + '">' + o2.abbrev + '</span>' : '';
  // Compact (past round): just logo + pill, winner lit / loser faded
  if (isCompact) {
    var t1loser = w2 === 4, t2loser = w1 === 4;
    var t1win = w1 === 4, t2win = w2 === 4;
    var t1isPredC = t1 && t1.includes('/');
    var t2isPredC = t2 && t2.includes('/');
    var smScore = (!t1isPredC && !t2isPredC && (w1 > 0 || w2 > 0))
      ? '<div class="bc-sm-score">' + w1 + '–' + w2 + '</div>' : '';
    return '<div class="bc-card bc-card-sm' + (live ? ' bc-live' : '') + '">'
      + (t1isPredC
        ? '<div class="bc-team"><span class="bc-name" style="opacity:0.45;font-size:10px">' + t1 + '</span></div>'
        : '<div class="bc-team' + (t1loser ? ' bc-loser' : t1win ? ' bc-winner' : '') + '" style="border-left-color:' + (c1||'transparent') + '">'
          + '<img class="bc-logo" src="https://assets.nhle.com/logos/nhl/svg/' + t1 + '_'+logoSfx(t1)+'.svg" onerror="this.style.display=\'none\'">'
          + p1pill + '</div>')
      + (t2isPredC
        ? '<div class="bc-team"><span class="bc-name" style="opacity:0.45;font-size:10px">' + t2 + '</span></div>'
        : '<div class="bc-team' + (t2loser ? ' bc-loser' : t2win ? ' bc-winner' : '') + '" style="border-left-color:' + (c2||'transparent') + '">'
          + '<img class="bc-logo" src="https://assets.nhle.com/logos/nhl/svg/' + t2 + '_'+logoSfx(t2)+'.svg" onerror="this.style.display=\'none\'">'
          + p2pill + '</div>')
      + smScore
      + '</div>';
  }
  var gamesHtml = (!shareMode && gamesData) ? buildBracketGames(t1, t2, gamesData) : '';
  var clickAttr = (!shareMode && gamesHtml) ? ' onclick="toggleBracketCard(this)"' : '';
  var t1win = w1 === 4, t2win = w2 === 4;
  var t1isPred = t1 && t1.includes('/');
  var t2isTBD = !t2 || t2 === 'TBD';
  var t2isPred = t2 && t2.includes('/');
  var row1 = t1isPred
    ? '<div class="bc-team"><span class="bc-name" style="opacity:0.45">' + t1 + '</span></div>'
    : '<div class="bc-team' + (t1elim ? ' bc-elim' : t1win ? ' bc-winner' : '') + '" style="border-left-color:' + (c1 || 'transparent') + '">'
      + '<img class="bc-logo" src="https://assets.nhle.com/logos/nhl/svg/' + t1 + '_'+logoSfx(t1)+'.svg" onerror="this.style.display=\'none\'">'
      + '<span class="bc-name">' + t1 + '</span>'
      + p1pill
      + '<span class="bc-wins' + (t1lead ? ' bc-lead' : '') + '">' + w1 + '</span>'
      + '</div>';
  var row2 = t2isTBD
    ? '<div class="bc-team" style="justify-content:center"><span class="bc-name" style="color:var(--muted);font-weight:400">TBD</span></div>'
    : t2isPred
      ? '<div class="bc-team"><span class="bc-name" style="opacity:0.45">' + t2 + '</span></div>'
      : '<div class="bc-team' + (t2elim ? ' bc-elim' : t2win ? ' bc-winner' : '') + '" style="border-left-color:' + (c2 || 'transparent') + '">'
      + '<img class="bc-logo" src="https://assets.nhle.com/logos/nhl/svg/' + t2 + '_'+logoSfx(t2)+'.svg" onerror="this.style.display=\'none\'">'
      + '<span class="bc-name">' + t2 + '</span>'
      + p2pill
      + '<span class="bc-wins' + (t2lead ? ' bc-lead' : '') + '">' + w2 + '</span>'
      + '</div>';
  return '<div class="bc-card' + (live ? ' bc-live' : '') + (isLarge ? ' bc-card-lg' : '') + '"' + clickAttr + '>'
    + row1
    + row2
    + (gamesHtml ? '<div class="bc-games-wrap">' + gamesHtml + '</div>' : '')
    + '</div>';
}

function buildBracket(shareMode) {
  var st = _makerState;
  if (!st || !st.parsed) return '<div class="loading">Loading...</div>';
  var p = st.parsed;
  var r1w = p.r1w || [], r1e = p.r1e || [];
  var r2 = p.r2 || [null,null,null,null];
  var r3 = p.r3 || [null,null];
  var r4 = p.r4 || null;
  var gd = st.gamesData || [];
  function predBracket(s1, s2) {
    var s1done = s1 && (s1.topWins === 4 || s1.bottomWins === 4);
    var s2done = s2 && (s2.topWins === 4 || s2.bottomWins === 4);
    if (!s1done && !s2done) return null;
    return predictedMatchup(s1, s2);
  }
  var pr2 = [
    augmentPartialR2(r2[0] || predBracket(r1w[0], r1w[1]), r1w[0], r1w[1]),
    augmentPartialR2(r2[1] || predBracket(r1w[2], r1w[3]), r1w[2], r1w[3]),
    augmentPartialR2(r2[2] || predBracket(r1e[0], r1e[1]), r1e[0], r1e[1]),
    augmentPartialR2(r2[3] || predBracket(r1e[2], r1e[3]), r1e[2], r1e[3]),
  ];

  var ar = getActiveRound(p);
  // col widths: compact past cols (50px), active col (80px), default r2 (56px)
  var cw1 = ar === 1 ? '' : 'width:50px;flex:none';
  var cw2 = ar === 2 ? 'flex:1;width:auto' : (ar > 2 ? 'width:50px' : '');
  var cw3 = ar === 3 ? 'width:90px' : (ar > 3 ? 'width:50px' : '');
  var cw4 = ar === 4 ? 'width:72px' : '';
  function c(s, round) { return buildBracketCard(s, gd, ar===round, shareMode, round < ar); }
  function cl(s) { return buildBracketCard(s, gd, ar===1, shareMode, ar > 1); }

  var shareBtn = shareMode ? '' : '<button onclick="showBracketShareOverlay()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:Inter,sans-serif;font-size:10px;padding:3px 8px;border-radius:8px;cursor:pointer">📸</button>';
  return '<div class="bracket-wrap">'
    + '<div class="bracket-conf-labels"><span class="bracket-conf-label">Western Conference</span>' + shareBtn + '<span class="bracket-conf-label">Eastern Conference</span></div>'

    // Top half: [R1-W + R2-W] | center gap | [R2-E + R1-E]
    + '<div class="bracket-half">'
    + '<div class="bc-half-group">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1w[0]) + cl(r1w[1]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[0], 2) + '</div>'
    + '</div>'
    + '<div class="bc-center-gap"></div>'
    + '<div class="bc-half-group" style="flex-direction:row-reverse">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1e[0]) + cl(r1e[1]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[2], 2) + '</div>'
    + '</div>'
    + '</div>'

    // Middle: CF-W | SCF | CF-E
    + '<div class="bracket-middle">'
    + '<div class="bc-cf-col"><div class="bc-round-label">Conf Finals</div>' + c(r3[0]) + '</div>'
    + '<div class="bc-scf-col" style="' + cw4 + '"><div class="bc-trophy"><img src="https://assets.nhle.com/logos/playoffs/png/scp-20252026-cup.png" alt="Stanley Cup Final"></div><div class="bc-scf-label">Stanley Cup<br>Final</div>' + c(r4, 4) + '</div>'
    + '<div class="bc-cf-col"><div class="bc-round-label">Conf Finals</div>' + c(r3[1]) + '</div>'
    + '</div>'

    // Bottom half: [R1-W + R2-W] | center gap | [R2-E + R1-E]
    + '<div class="bracket-half">'
    + '<div class="bc-half-group">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1w[2]) + cl(r1w[3]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[1], 2) + '</div>'
    + '</div>'
    + '<div class="bc-center-gap"></div>'
    + '<div class="bc-half-group" style="flex-direction:row-reverse">'
    +   '<div class="bc-r1-col" style="' + cw1 + '">' + cl(r1e[2]) + cl(r1e[3]) + '</div>'
    +   '<div class="bc-r2-col" style="' + cw2 + '"><div class="bc-round-label">Rd 2</div>' + c(pr2[3], 2) + '</div>'
    + '</div>'
    + '</div>'

    + '</div>';
}

}

function showRoundupOverlayMaker() {
  var st = _makerState;
  if (!st.pieTotals || !st.gamesData) return;

  function etDate(utcStr) {
    var d = new Date(new Date(utcStr).getTime() - 4*60*60*1000);
    return d.toISOString().slice(0,10);
  }
  var etNow = new Date(Date.now() - 4*60*60*1000);
  var todayET = etNow.toISOString().slice(0,10);
  var yesterdayET = new Date(etNow.getTime() - 86400000).toISOString().slice(0,10);

  var yesterdayGames = st.gamesData.filter(function(g){ return g.startUTC && etDate(g.startUTC)===yesterdayET && (g.state==='OFF'||g.state==='FINAL'); });
  var tonightGames   = st.gamesData.filter(function(g){ return g.startUTC && etDate(g.startUTC)===todayET   && (g.state==='FUT'||g.state==='PRE'); });

  var dateLabel = new Date(yesterdayET+'T12:00:00Z').toLocaleDateString('en-US',{month:'long',day:'numeric',timeZone:'UTC'});
  var lines = ['🏒 PLAYOFF ROUNDUP — '+dateLabel, ''];

  if (yesterdayGames.length === 0) {
    lines.push('No playoff games yesterday.');
    lines.push('');
  } else {
    yesterdayGames.forEach(function(g) {
      var isOT = g.periodType==='OT'||(g.period>3&&g.periodType!=='SO');
      var isSO = g.periodType==='SO';
      var suffix = isSO?' (SO)':isOT?' (OT)':'';
      lines.push(g.away+' '+g.awayScore+' · '+g.home+' '+g.homeScore+suffix);
      var series = getSeriesForTeamsMaker(g.away, g.home);
      var winner=null, loser=null;
      if (series) {
        var w1=series.topWins, w2=series.bottomWins;
        var isOver = w1===4||w2===4;
        if (isOver) {
          winner = w1===4?series.topTeam:series.bottomTeam;
          loser  = w1===4?series.bottomTeam:series.topTeam;
          lines.push(winner+' wins '+Math.max(w1,w2)+'-'+Math.min(w1,w2));
        } else {
          lines.push(w1===w2?'Series tied '+w1+'-'+w2:(w1>w2?series.topTeam:series.bottomTeam)+' leads '+Math.max(w1,w2)+'-'+Math.min(w1,w2));
        }
      }
      var o1m=getTeamOwnerMaker(g.away), o2m=getTeamOwnerMaker(g.home);
      var p1=o1m?o1m.abbrev:null, p2=o2m?o2m.abbrev:null;
      var o1=parseFloat((st.odds[g.away]||'0%').replace('%','')), o2=parseFloat((st.odds[g.home]||'0%').replace('%',''));
      var dm=st.deltaMap||{};
      var arr=function(t){var d=dm[t];return d>0?' ▲':d<0?' ▼':'';};
      var fmt=function(team,odds,player){
        if(team===loser) return team+' eliminated'+(player?' ('+player+')':'');
        return team+arr(team)+' at '+odds.toFixed(1)+'%'+(player?' ('+player+')':'');
      };
      lines.push(fmt(g.away,o1,p1)+', '+fmt(g.home,o2,p2));
      lines.push('');
    });
  }

  // prev-day standings delta
  var prevTotals = {};
  if (st.historyData && st.historyData.length > 0) {
    var todayStr2 = new Date().toISOString().slice(0,10);
    var prevDates = [...new Set(st.historyData.map(function(r){return r.date;}).filter(Boolean))].sort().filter(function(d){return d<todayStr2;});
    var prevDate = prevDates[prevDates.length-1];
    if (prevDate) {
      var prevSnaps = st.historyData.filter(function(r){return r.date===prevDate;});
      st.pieTotals.forEach(function(p) {
        prevTotals[p.abbrev] = p.teams.reduce(function(sum,t){
          var snap=prevSnaps.find(function(r){return r.team===t;});
          return sum+(snap?parseFloat(snap.cup)||0:0);
        },0);
      });
    }
  }

  lines.push('——————————————');
  lines.push('STANDINGS');
  ['🥇','🥈','🥉','4️⃣'].forEach(function(e,i){
    var p=st.pieTotals[i];
    if(!p) return;
    var prev=prevTotals[p.abbrev];
    var arrow=prev!=null?(p.total>prev+0.05?' ▲':p.total<prev-0.05?' ▼':''):'';
    lines.push(e+' '+p.name+' —'+arrow+' '+p.total.toFixed(1)+'%');
  });

  if (tonightGames.length > 0) {
    lines.push('');
    lines.push('——————————————');
    lines.push('TONIGHT');
    tonightGames.forEach(function(g) {
      var series=getSeriesForTeamsMaker(g.away,g.home);
      var ctx='';
      if(series){var w1=series.topWins,w2=series.bottomWins;ctx=w1===w2?' (tied '+w1+'-'+w2+')':' ('+(w1>w2?series.topTeam:series.bottomTeam)+' leads '+Math.max(w1,w2)+'-'+Math.min(w1,w2)+')';}
      var timeStr='';
      try{timeStr=' · '+new Date(g.startUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York',hour12:true})+' ET';}catch(e){}
      lines.push('🏒 '+g.away+' vs '+g.home+ctx+timeStr);
    });
  }

  var text = lines.join('\n');
  var overlay = document.createElement('div');
  overlay.id = 'roundup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10000;background:#0d1117;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;box-sizing:border-box;';
  overlay.innerHTML = '<div style="max-width:460px;margin:0 auto">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:900;letter-spacing:1px;color:#f9fafb">📋 ROUNDUP</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="roundup-copy-btn" style="background:#3b82f6;border:none;color:#fff;font-family:Inter,sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer">Copy</button>'
    +'<button onclick="document.getElementById(\'roundup-overlay\').remove()" style="background:rgba(255,255,255,0.08);border:none;color:#9ca3af;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-size:12px">✕</button>'
    +'</div></div>'
    +'<textarea id="roundup-text" readonly style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#f9fafb;font-family:monospace;font-size:12px;line-height:1.7;padding:14px;min-height:420px;resize:none;outline:none;"></textarea>'
    +'</div>';
  document.body.appendChild(overlay);
  document.getElementById('roundup-text').value = text;
  document.getElementById('roundup-copy-btn').onclick = function() {
    navigator.clipboard.writeText(text).then(function(){
      var b=document.getElementById('roundup-copy-btn'); b.textContent='✓ Copied!';
      setTimeout(function(){b.textContent='Copy';},2000);
    });
  };
}

function buildPathToCup(teams, oddsMap, playerColor) {
  var bars = teams
    .map(function(t) { return { t: t, pct: parseFloat((oddsMap[t]||'0%').replace('%','')) }; })
    .sort(function(a,b) { return b.pct - a.pct; });
  if (bars.every(function(x){return x.pct===0;})) return '';
  var alive = bars.filter(function(x){return x.pct>=0.1;});
  var max = alive.length ? alive[0].pct : Math.max.apply(null, bars.map(function(x){return x.pct;}).concat([0.1]));
  var inner = bars.map(function(x) {
    var isElim = x.pct < 0.1;
    var w = isElim ? Math.max(4, Math.round((x.pct/max)*100)) : Math.round((x.pct/max)*100);
    var fill = isElim ? 'rgba(156,163,175,0.5)' : playerColor;
    return '<div class="ptc-bar-row"'+(isElim?' style="opacity:0.45"':'')+'>'+
      '<span class="ptc-label" style="width:22px;text-align:right">'+x.t+'</span>'+
      '<div class="ptc-bar-track"><div class="ptc-bar-fill" style="width:'+w+'%;background:'+fill+'"></div></div>'+
      '<span class="ptc-label" style="width:30px">'+x.pct.toFixed(1)+'%</span>'+
      '</div>';
  }).join('');
  return '<div style="margin-top:7px;display:flex;flex-direction:column;gap:4px;padding:0 2px">'+inner+'</div>';
}

function buildShareSeriesRowMaker(s) {

    var pc = getPC(getActivePool(), o.ci);

  }
  var t1elim = s.bottomWins === 4, t2elim = s.topWins === 4;
  return `<div class="share-series-row">
    <div class="share-series-team" style="${t1elim?'opacity:0.4':''}">
      ${pill(o1)}<span style="font-size:11px;font-weight:700;color:#f9fafb;font-family:'Barlow Condensed',sans-serif">${s.topTeam}</span>

}

function buildRaceSparklineMaker(histData, odds, pool) {
  if (!histData || histData.length < 2 || !pool) return '';
  var today = new Date().toISOString().substring(0,10);
  var dates = [...new Set(histData.map(function(d){return d.date;}).filter(Boolean))].sort();
  if (!dates.includes(today)) dates.push(today);
  if (dates.length < 2) return '';

  var players = pool.players.map(function(p, i) {
    var pc = p.color ? {color:p.color} : getPC(pool, i);
    var abbrev = (p.abbrev || p.name.substring(0,3)).toUpperCase();
    var pts = dates.map(function(date) {
      if (date === today) return p.teams.reduce(function(sum,t){return sum+parseFloat((odds[t]||'0%').replace('%',''));},0);
      return p.teams.reduce(function(sum,team){
        var e=histData.find(function(d){return d.date===date&&(d.team||'').toUpperCase()===team.toUpperCase();});
        return sum+(e?parseFloat(e.cup)||0:0);
      },0);
    });
    return {abbrev:abbrev, color:pc.color, points:pts};
  });

  var allPts=players.reduce(function(acc,p){return acc.concat(p.points);},[]);
  var dataMin=Math.min.apply(null,allPts), dataMax=Math.max.apply(null,allPts);
  var pad=Math.max(1,(dataMax-dataMin)*0.15);
  var yMin=Math.max(0,dataMin-pad), yMax=Math.min(100,dataMax+pad);
  if(yMax===yMin){yMin=0;yMax=50;}

  var W=320,H=72,padL=4,padR=42,padT=6,padB=6;
  var cW=W-padL-padR, cH=H-padT-padB, n=dates.length;
  function gx(i){return padL+(n>1?(i/(n-1))*cW:cW/2);}
  function gy(v){return padT+cH*(1-(v-yMin)/(yMax-yMin));}

  var labels=players.map(function(p){
    return {abbrev:p.abbrev, color:p.color, y:gy(p.points[p.points.length-1])};
  }).sort(function(a,b){return a.y-b.y;});
  for(var i=1;i<labels.length;i++){if(labels[i].y-labels[i-1].y<12)labels[i].y=labels[i-1].y+12;}
  var labelY={};labels.forEach(function(l){labelY[l.abbrev]=l.y;});

  var lines=players.map(function(p){
    var linePts=p.points.map(function(v,i){return gx(i).toFixed(1)+','+gy(v).toFixed(1);}).join(' ');
    var lx=gx(n-1), dotY=gy(p.points[p.points.length-1]);
    return '<polyline points="'+linePts+'" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      +'<circle cx="'+lx.toFixed(1)+'" cy="'+dotY.toFixed(1)+'" r="2.5" fill="rgba(255,255,255,0.25)"/>'
      +'<text x="'+(lx+6).toFixed(1)+'" y="'+(labelY[p.abbrev]+4).toFixed(1)+'" font-size="9.5" font-weight="700" font-family="Barlow Condensed,sans-serif" fill="'+p.color+'">'+p.abbrev+'</text>';
  }).join('');

  return '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);opacity:0.45">'
    +'<svg width="85%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible;margin:0 auto">'+lines+'</svg></div>';
}

function buildOnTheClock(gamesData, oddsMap) {
  if (!gamesData || !gamesData.length) return '';

  var tonight = gamesData.filter(function(g) {
    if (!g.startUTC) return false;
    var d = new Date(new Date(g.startUTC).getTime() - 4*60*60*1000);
    return d.toISOString().slice(0,10) === todayET && (g.state==='FUT'||g.state==='PRE'||g.state==='LIVE'||g.state==='CRIT'||g.state==='OFF'||g.state==='FINAL');
  });
  if (!tonight.length) return '';

    var awayCup = parseFloat((oddsMap[g.away]||'0%').replace('%',''));
    var homeCup = parseFloat((oddsMap[g.home]||'0%').replace('%',''));
    var timeStr = '';
    try { timeStr = new Date(g.startUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York',hour12:true})+' ET'; } catch(e){}
    var isLive = g.state==='LIVE'||g.state==='CRIT';
    var isFinal = g.state==='OFF'||g.state==='FINAL';
    var hasScore = g.awayScore != null && g.homeScore != null;
    var awayPill = awayOwner ? (function(){var pc=getPC(pool,awayOwner.ci);return '<span class="pill" style="background:'+pc.bg+';color:'+pc.color+';font-size:9px;padding:0 5px;border-radius:4px;font-weight:700">'+esc(awayOwner.abbrev)+'</span>';})() : '';
    var homePill = homeOwner ? (function(){var pc=getPC(pool,homeOwner.ci);return '<span class="pill" style="background:'+pc.bg+';color:'+pc.color+';font-size:9px;padding:0 5px;border-radius:4px;font-weight:700">'+esc(homeOwner.abbrev)+'</span>';})() : '';
    var periodLabel = '';
    if (isLive && g.period) {
      var pt = g.periodType || 'REG';

    }
    var borderTop = i > 0 ? 'border-top:1px solid rgba(255,255,255,0.05);margin-top:6px;padding-top:6px;' : '';
    var isUpcoming = !isLive && !isFinal;
    var tappable = g.id && (isLive || isFinal);
    var cursor = (tappable || (isUpcoming && g.id)) ? 'cursor:pointer;' : '';
    var onclick = tappable
      ? ' onclick="showLiveGameOverlayMaker(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')"'
      : (isUpcoming && g.id ? ' onclick="showGamePreviewOverlayM(\''+g.id+'\',\''+g.away+'\',\''+g.home+'\',\''+g.season+'\')"' : '');
    html += '<div'+onclick+' style="display:flex;align-items:center;gap:7px;'+borderTop+cursor+'overflow:hidden">';
    if (isLive) {
      html += '<div style="flex-shrink:0;min-width:48px">';
      html += '<div style="font-size:10px;color:#f87171;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.3px;display:flex;align-items:center"><span class="live-dot"></span>LIVE</div>';
      if (periodLabel) html += '<div style="font-size:10px;color:#6b7280;font-family:\'Barlow Condensed\',sans-serif">'+periodLabel+'</div>';
      html += '</div>';

    html += '</div>';
  });
  html += '</div>';
  return html;

  var chartEl = document.getElementById('lgo-chart-container');

  var shotEl = document.getElementById('lgo-shotmap-container');
  if (shotEl && d.shots && d.shots.length) {
    var subShots = d.shots.filter(function(s){return s.t<=t;});
    shotEl.innerHTML = buildShotMapM(subShots, d.away, d.home);
  }
  var ctrlEl = document.getElementById('lgo-control-container');
  if (ctrlEl && last && last.hz != null && !isNaN(last.hz)) {

    var hs2=Math.round((last.hs||0.5)*1000)/10, as2=Math.round((1-(last.hs||0.5))*1000)/10;
    ctrlEl.innerHTML = buildDualBarM('Zone Control',az,hz,d.away,d.home,d.awayColor,d.homeColor)
      +buildDualBarM('Shot Quality',as2,hs2,d.away,d.home,d.awayColor,d.homeColor);
  }
  var scrubEl = document.getElementById('lgo-scrub');
  if (scrubEl) { var pct=(val/(d.timeline.length-1)*100).toFixed(1); scrubEl.style.background='linear-gradient(to right,#3b82f6 '+pct+'%,rgba(255,255,255,0.1) '+pct+'%)'; }
  var wpEl = document.getElementById('lgo-wp-header');
  if (wpEl && last) {
    var homeWP = lgoPctM(last.wp), awayWP = lgoPctM(1-last.wp);
    wpEl.innerHTML = '<span style="color:#9ca3af">'+d.away+'</span> <span style="color:#f9fafb;font-weight:700">'+awayWP+'%</span>'
      +' <span style="color:#374151;margin:0 4px">·</span>'
      +'<span style="color:#f9fafb;font-weight:700">'+homeWP+'%</span> <span style="color:#9ca3af">'+d.home+'</span>';
  }
  var labelEl = document.getElementById('lgo-scrub-label');
  if (labelEl) {
    if (val >= d.timeline.length - 1) {
      labelEl.textContent = 'FINAL';
    } else {
      var gp = t<=1200?1:t<=2400?2:t<=3600?3:4, gs = t%1200, gm = Math.floor(gs/60), gc = gs%60;
      labelEl.textContent = 'P'+gp+' '+gm+':'+(gc<10?'0':'')+gc;
    }
  }
}

function formatGameTime(utcStr) {
  var d = new Date(utcStr);
  // NHL uses noon UTC as placeholder when game time isn't confirmed
  if (d.getUTCHours() === 12 && d.getUTCMinutes() === 0) return "TBD";
  var dET = new Date(d.getTime() - 4 * 3600000);
  var h = dET.getUTCHours(), m = dET.getUTCMinutes();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + (m ? ":" + String(m).padStart(2,"0") : "") + " " + ampm;
}

function isSeriesLive(gd,t1,t2){
  if(!gd||!gd.length)return false;
  return gd.some(function(g){return[g.away,g.home].indexOf(t1)>=0&&[g.away,g.home].indexOf(t2)>=0&&(g.state==='LIVE'||g.state==='CRIT');});
}

function getGameBadge(gamesData, t1, t2) {
  if (!gamesData || !gamesData.length) return "";
  var today = new Date().toDateString();
  for (var i = 0; i < gamesData.length; i++) {
    var g = gamesData[i];
    if ([g.away,g.home].indexOf(t1)<0 || [g.away,g.home].indexOf(t2)<0) continue;
    function toEasternDate2(utcStr) {
      var ET_OFFSET=-4*3600000,d=new Date(new Date(utcStr).getTime()+ET_OFFSET);
      if(d.getUTCHours()<5)d.setUTCDate(d.getUTCDate()-1);
      return d.toISOString().substring(0,10);
    }
    var gameUTCDate = toEasternDate2(g.startUTC);
    var nowEastern = toEasternDate2(new Date().toISOString());
    if (gameUTCDate !== nowEastern) continue;
    var as = g.awayScore !== null ? g.awayScore : 0;
    var hs = g.homeScore !== null ? g.homeScore : 0;
    if (g.state === "FUT" || g.state === "PRE") return '<span class="game-badge">'+formatGameTime(g.startUTC)+'</span>';
    if (g.state === "LIVE" || g.state === "CRIT") return '<span class="game-badge live">'+g.away+' '+as+' : '+hs+' '+g.home+(g.period?' P'+g.period:'')+'</span>';
    if (g.state === "FINAL" || g.state === "OFF") return '<span class="game-badge final">'+g.away+' '+as+' : '+hs+' '+g.home+' F</span>';
  }
  return "";
}

/* ── Pull-to-refresh ── */
(function() {
  var pill, icon, wrap;
  var startY = 0, startX = 0, lastY = 0;
  var active = false, busy = false;
  var THRESH = 62;
  var MAX    = 115;
  var HOLD   = 62;

  function init() {
    pill = document.getElementById('ptr-pill');
    icon = document.getElementById('ptr-icon');
    wrap = document.getElementById('page-wrap');
    document.addEventListener('touchstart', ts, { passive: true });
    document.addEventListener('touchmove',  tm, { passive: false });
    document.addEventListener('touchend',   te, { passive: true });
    document.addEventListener('touchcancel', tc, { passive: true });
  }

  function overlayOpen() {
    var kids = document.body.children;
    for (var i = 0; i < kids.length; i++) {
      var id = kids[i].id;
      if (id === 'ptr-pill' || id === 'page-wrap') continue;
      if (parseInt(window.getComputedStyle(kids[i]).zIndex) >= 10000) return true;
    }
    return false;
  }

  function ts(e) {
    if (busy) return;
    startY = lastY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    active = false;
  }

  function tm(e) {
    if (busy) return;
    var t  = e.touches[0];
    var dy = t.clientY - startY;
    var dx = Math.abs(t.clientX - startX);
    lastY  = t.clientY;

    if (!active) {
      if (window.scrollY > 10 || dy < 10 || dx > dy * 0.65 || overlayOpen()) return;
      active = true;
    }
    e.preventDefault();

    var v    = MAX * (1 - Math.exp(-dy / (MAX * 1.05)));
    var prog = Math.min(v / THRESH, 1);

    wrap.style.transition = 'none';
    wrap.style.transform  = 'translateY(' + v + 'px)';

    icon.style.transform = 'rotate(' + (prog * 180) + 'deg)';
    icon.style.color     = v >= THRESH ? 'var(--text)' : 'var(--muted)';
  }

  function te() {
    if (!active || busy) { active = false; return; }
    active = false;
    var dy = lastY - startY;
    var v  = MAX * (1 - Math.exp(-dy / (MAX * 1.6)));
    if (v >= THRESH) go(); else snap();
  }

  function tc() { active = false; if (!busy) snap(); }

  function snap() {
    wrap.style.transition = 'transform 0.42s cubic-bezier(0.25,1,0.5,1)';
    wrap.style.transform  = 'translateY(0)';
    icon.style.transform  = '';
    icon.style.color      = 'var(--muted)';
  }

  function go() {
    busy = true;
    wrap.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
    wrap.style.transform  = 'translateY(' + HOLD + 'px)';
    icon.style.transform  = '';
    icon.style.color      = 'var(--text)';
    icon.className        = 'ptr-spin';

    doRender().then(done).catch(function() { busy = false; snap(); });
  }

  function done() {
    icon.className   = '';
    icon.textContent = '✓';
    icon.style.color = '#22c55e';
    setTimeout(function() {
      wrap.style.transition = 'transform 0.58s cubic-bezier(0.25,1,0.5,1)';
      wrap.style.transform  = 'translateY(0)';
      setTimeout(function() {
        icon.textContent = '↻';
        icon.style.color = 'var(--muted)';
        busy = false;
      }, 600);
    }, 850);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
